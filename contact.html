<style>
.contact-hero{min-height:62vh;display:flex;align-items:center;text-align:center;padding:80px 0}
.contact-hero h1{font-size:clamp(2.6rem,8vw,5.4rem)}
.contact-hero .sub{margin:22px auto 0}
.cta-mail{display:inline-flex;align-items:center;gap:14px;margin-top:40px;background:var(--accent);
  color:var(--accent-ink);border-radius:100px;padding:14px 16px 14px 28px;font-weight:600;font-size:1rem;
  transition:transform .4s var(--ease),box-shadow .4s var(--ease)}
.cta-mail .ic{width:34px;height:34px;border-radius:50%;background:rgba(10,10,12,.18);display:grid;place-items:center}
.cta-mail:hover{transform:translateY(-2px);box-shadow:0 16px 40px -14px rgba(0,163,255,.55)}
.meta-row{display:flex;gap:14px;justify-content:center;margin-top:42px;flex-wrap:wrap}
.meta-pill{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--hair);background:var(--tray);
  border-radius:100px;padding:11px 20px;font-size:.88rem;color:var(--muted);font-weight:500;
  transition:border-color .3s var(--ease),color .3s var(--ease),transform .3s var(--ease)}
.meta-pill:hover{border-color:var(--accent);color:var(--text);transform:translateY(-2px)}
</style>
</head>
